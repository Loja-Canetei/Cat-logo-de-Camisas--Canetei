<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo | Minha Loja</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top">
    <div class="wrap">
      <div class="brand">
        <div class="brand__title">Minha Loja de Camisas</div>
        <div class="brand__subtitle">Catálogo</div>
      </div>

      <a class="btn btn--wpp" id="wppTopo" href="#" target="_blank" rel="noopener">
        Falar no WhatsApp
      </a>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h1>Camisas de time</h1>
      <p>Escolha sua camisa e chame no WhatsApp para comprar.</p>
    </section>

    <section class="controls">
      <input id="busca" class="input" type="search" placeholder="Buscar (ex: Flamengo, Real, Brasil)..." />

      <select id="filtro" class="input">
        <option value="todos">Todas as categorias</option>
        <option value="brasileirao">Brasileirão</option>
        <option value="europeu">Europeus</option>
        <option value="selecoes">Seleções</option>
      </select>
    </section>

    <section>
      <div id="grid" class="grid"></div>
      <div id="vazio" class="empty hidden">Nenhuma camisa encontrada.</div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap footer__inner">
      <small>© <span id="ano"></span> Minha Loja — Jequié/BA</small>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
