<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Canetei - Camisas de Time</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header com logo ocupando toda a área -->
    <header class="top">
        <div class="logo-container">
            <img src="logo 2.0.jpg" alt="Canetei Logo" class="logo">
        </div>
        
        <!-- Botão WhatsApp verde centralizado -->
        <div class="wpp-container">
            <a href="https://wa.me/5577999887766?text=Olá! Gostaria de saber mais sobre as camisas de time." class="btn btn--wpp" target="_blank">
                Falar no WhatsApp
            </a>
        </div>
    </header>

    <!-- Conteúdo principal -->
    <main class="wrap">
        <!-- Hero Section -->
        <section class="hero">
            <h1>Camisas de Time</h1>
            <p>Clique no botão "Consultar Preço" na camisa que deseja e conclua a compra no WhatsApp.</p>
        </section>

        <!-- Controles de busca e filtro -->
        <div class="controls">
            <input type="text" id="searchInput" class="input" placeholder="Buscar por time, código ou liga (ex: CAN001, Real Madrid)...">
            <select id="categoryFilter" class="input">
                <option value="">Todas as categorias</option>
                <option value="La Liga">La Liga</option>
                <option value="Premier League">Premier League</option>
                <option value="Serie A">Serie A</option>
                <option value="Bundesliga">Bundesliga</option>
                <option value="Ligue 1">Ligue 1</option>
                <option value="Brasileirão">Brasileirão</option>
            </select>
        </div>

        <!-- Grid de produtos -->
        <div class="grid" id="productsGrid">
            <!-- Os produtos serão inseridos aqui pelo JavaScript -->
        </div>

        <!-- Mensagem quando não há resultados -->
        <div class="empty hidden" id="emptyMessage">
            <p>Nenhuma camisa encontrada. Tente buscar por outro termo.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="wrap">
            <div class="footer__inner">
                <p>&copy; 2024 Loja Canetei - Moda para Craques</p>
            </div>
        </div>
    </footer>

    <script>
        // Dados dos produtos
        const products = [
            {
                code: 'CAN001',
                name: 'Real Madrid Home 2024',
                league: 'La Liga',
                image: 'Real Madrid Home 2024.jpg',
                sizes: ['P', 'M', 'G', 'GG']
            },
            {
                code: 'CAN002',
                name: 'Barcelona Away 2024',
                league: 'La Liga',
                image: 'Barcelona Away 2024.jpg',
                sizes: ['P', 'M', 'G', 'GG']
            },
            {
                code: 'CAN003',
                name: 'Manchester City Home 2024',
                league: 'Premier League',
                image: 'Manchester City Home 2024.jpg',
                sizes: ['P', 'M', 'G', 'GG']
            },
            {
                code: 'CAN004',
                name: 'Arsenal Home 2024',
                league: 'Premier League',
                image: 'Arsenal Home 2024.jpg',
                sizes: ['P', 'M', 'G', 'GG']
            },
            {
                code: 'CAN005',
                name: 'Inter de Milão Home 2024',
                league: 'Serie A',
                image: 'Inter de Milão Home 2024.jpg',
                sizes: ['P', 'M', 'G', 'GG']
            },
            {
                code: 'CAN006',
                name: 'Juventus Home 2024',
                league: 'Serie A',
                image: 'Juventus Home 2024.jpg',
                sizes: ['P', 'M', 'G', 'GG']
            }
        ];

        // Função para criar o HTML de um produto
        function createProductCard(product) {
            const sizeBadges = product.sizes.map(size => 
                `<span class="badge">${size}</span>`
            ).join('');

            const whatsappMessage = encodeURIComponent(
                `Olá! Gostaria de consultar o preço da camisa:\n\n` +
                `Código: ${product.code}\n` +
                `Time: ${product.name}\n` +
                `Liga: ${product.league}\n\n` +
                `Aguardo retorno!`
            );

            return `
                <div class="card" data-name="${product.name.toLowerCase()}" data-code="${product.code.toLowerCase()}" data-league="${product.league}">
                    <img src="${product.image}" alt="${product.name}" class="card__img">
                    <div class="card__body">
                        <div class="card__code">Código: ${product.code}</div>
                        <div class="card__title">${product.name}</div>
                        <div class="card__meta">
                            <span>${product.league}</span>
                        </div>
                        <div class="badges">
                            ${sizeBadges}
                        </div>
                        <a href="https://wa.me/5577999887766?text=${whatsappMessage}" 
                           class="btn btn--buy" target="_blank">
                            Consultar Preço
                        </a>
                    </div>
                </div>
            `;
        }

        // Função para renderizar produtos
        function renderProducts(productsToRender = products) {
            const grid = document.getElementById('productsGrid');
            const emptyMessage = document.getElementById('emptyMessage');
            
            if (productsToRender.length === 0) {
                grid.innerHTML = '';
                emptyMessage.classList.remove('hidden');
            } else {
                grid.innerHTML = productsToRender.map(createProductCard).join('');
                emptyMessage.classList.add('hidden');
            }
        }

        // Função de busca
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            
            const filtered = products.filter(product => {
                const matchesSearch = !searchTerm || 
                    product.name.toLowerCase().includes(searchTerm) ||
                    product.code.toLowerCase().includes(searchTerm) ||
                    product.league.toLowerCase().includes(searchTerm);
                
                const matchesCategory = !categoryFilter || product.league === categoryFilter;
                
                return matchesSearch && matchesCategory;
            });
            
            renderProducts(filtered);
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterProducts);
        document.getElementById('categoryFilter').addEventListener('change', filterProducts);

        // Renderizar produtos inicialmente
        renderProducts();
    </script>
</body>
</html>
