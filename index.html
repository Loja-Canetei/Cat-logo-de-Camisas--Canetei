<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo | Loja Canetei</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top">
    <div class="wrap">
      <div class="brand">
        <div class="brand__title">Loja Canetei</div>
        <div class="brand__subtitle">Camisas de Time - Catálogo</div>
      </div>

      <a class="btn btn--wpp" id="wppTopo" href="#" target="_blank" rel="noopener">
        Falar no WhatsApp
      </a>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h1>Camisas de Time</h1>
      <p>Escolha sua camisa pelo código e consulte preço no WhatsApp.</p>
    </section>

    <section class="controls">
      <input id="busca" class="input" type="search" placeholder="Buscar por time, código ou liga (ex: CAN001, Real Madrid)..." />

      <select id="filtro" class="input">
        <option value="todos">Todas as categorias</option>
        <option value="laliga">La Liga</option>
        <option value="premier">Premier League</option>
        <option value="seriea">Serie A</option>
        <option value="brasileirao">Brasileirão</option>
        <option value="bundesliga">Bundesliga</option>
        <option value="ligue1">Ligue 1</option>
        <option value="mls">MLS</option>
        <option value="saudi">Saudi Pro League</option>
        <option value="selecoes">Seleções</option>
        <option value="copa2026">Copa do Mundo 2026</option>
        <option value="retros">Retrôs</option>
      </select>
    </section>

    <section>
      <div id="grid" class="grid"></div>
      <div id="vazio" class="empty hidden">Nenhuma camisa encontrada.</div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap footer__inner">
      <small>© <span id="ano"></span> Loja Canetei — Jequié/BA</small>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
